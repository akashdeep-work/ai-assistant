version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  zookeeper:
    image: bitnami/zookeeper:latest
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
    ports:
      - "2181:2181"

  kafka:
    image: bitnami/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_CFG_ZOOKEEPER_CONNECT=zookeeper:2181
      - ALLOW_PLAINTEXT_LISTENER=yes
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
    depends_on:
      - zookeeper

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      # Use the PORT variable from .env to bind the port
      - "${PORT}:${PORT}"
    environment:
      # Passing variables from .env into the container
      - APP_NAME
      - APP_VERSION
      - HOST
      - PORT
      - KAFKA_BOOTSTRAP_SERVER
      - KAFKA_PROMPT_REQUEST_TOPIC
      - KAFKA_PROMPT_RESPONSE_TOPIC
      - REDIS_URL
      - OLLAMA_BASE_URL
    depends_on:
      - redis
      - kafka

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Passing variables from .env into the container
      - KAFKA_BOOTSTRAP_SERVER
      - KAFKA_PROMPT_REQUEST_TOPIC
      - KAFKA_PROMPT_RESPONSE_TOPIC
      - OLLAMA_BASE_URL
    depends_on:
      - kafka