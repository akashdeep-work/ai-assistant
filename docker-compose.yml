version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"


  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      
      # 1. Define two listeners: CLIENT (for other containers) and EXTERNAL (for your host machine)
      - KAFKA_LISTENERS=CLIENT://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      
      # 2. Tell Kafka to advertise 'kafka:29092' inside the docker network
      - KAFKA_ADVERTISED_LISTENERS=CLIENT://kafka:29092,EXTERNAL://localhost:9092
      
      # 3. Map these listener names to the standard PLAINTEXT security protocol
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CLIENT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_INTER_BROKER_LISTENER_NAME=CLIENT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 5s
      timeout: 5s
      retries: 6

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"

    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - .:/app

    environment:
      # Passing variables from .env into the container
      - APP_NAME
      - APP_VERSION
      - HOST
      - PORT
      - KAFKA_BOOTSTRAP_SERVER
      - KAFKA_PROMPT_REQUEST_TOPIC
      - KAFKA_PROMPT_RESPONSE_TOPIC
      - REDIS_URL
      - OLLAMA_BASE_URL
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started
      

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - .:/app
      
    environment:
      # Passing variables from .env into the container
      - KAFKA_BOOTSTRAP_SERVER
      - KAFKA_PROMPT_REQUEST_TOPIC
      - KAFKA_PROMPT_RESPONSE_TOPIC
      - OLLAMA_BASE_URL
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_started