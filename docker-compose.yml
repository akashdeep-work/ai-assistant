version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"


  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@localhost:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      # Use the PORT variable from .env to bind the port
      - "${PORT}:${PORT}"

    volumes:
      - ./checkpoints.sqlite:/app/checkpoints.sqlite

    environment:
      # Passing variables from .env into the container
      - APP_NAME
      - APP_VERSION
      - HOST
      - PORT
      - KAFKA_BOOTSTRAP_SERVER
      - KAFKA_PROMPT_REQUEST_TOPIC
      - KAFKA_PROMPT_RESPONSE_TOPIC
      - REDIS_URL
      - OLLAMA_BASE_URL
    depends_on:
      - redis
      - kafka

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      - ./checkpoints.sqlite:/app/checkpoints.sqlite
      
    environment:
      # Passing variables from .env into the container
      - KAFKA_BOOTSTRAP_SERVER
      - KAFKA_PROMPT_REQUEST_TOPIC
      - KAFKA_PROMPT_RESPONSE_TOPIC
      - OLLAMA_BASE_URL
    depends_on:
      - kafka